<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Application Form</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page-wrapper">
      <section class="form-card">
        <header class="form-header">
          <h1>Job Application</h1>
          <p>Complete this application to apply for the position. All fields are required.</p>
        </header>

        <form id="jobForm" novalidate>
          <div class="field-grid">
            <div class="form-group">
              <label for="fullName">Full Name</label>
              <input type="text" id="fullName" name="fullName" placeholder="John Doe" required />
              <div class="error-message" aria-live="polite"></div>
            </div>

            <div class="form-group">
              <label for="email">Email Address</label>
              <input type="email" id="email" name="email" placeholder="you@example.com" required />
              <div class="error-message" aria-live="polite"></div>
            </div>

            <div class="form-group">
              <label for="phone">Phone Number</label>
              <input type="tel" id="phone" name="phone" placeholder="1234567890" required />
              <div class="error-message" aria-live="polite"></div>
            </div>

            <div class="form-group">
              <label for="dob">Date of Birth</label>
              <input type="date" id="dob" name="dob" required />
              <div class="error-message" aria-live="polite"></div>
            </div>
          </div>

          <fieldset class="form-group radio-group">
            <legend>Gender</legend>
            <label><input type="radio" name="gender" value="Male" /> Male</label>
            <label><input type="radio" name="gender" value="Female" /> Female</label>
            <label><input type="radio" name="gender" value="Other" /> Other</label>
            <div class="error-message" aria-live="polite"></div>
          </fieldset>

          <div class="form-group">
            <label for="position">Position Applying For</label>
            <select id="position" name="position" required>
              <option value="">Select a position</option>
              <option value="Software Engineer">Software Engineer</option>
              <option value="Product Designer">Product Designer</option>
              <option value="Marketing Specialist">Marketing Specialist</option>
              <option value="Customer Success">Customer Success</option>
            </select>
            <div class="error-message" aria-live="polite"></div>
          </div>

          <div class="form-group">
            <label for="resume">Upload Resume</label>
            <input type="file" id="resume" name="resume" accept=".pdf,.doc,.docx" required />
            <div class="error-message" aria-live="polite"></div>
          </div>

          <fieldset class="form-group checkbox-group">
            <legend>Skills</legend>
            <label><input type="checkbox" name="skills" value="Communication" /> Communication</label>
            <label><input type="checkbox" name="skills" value="Teamwork" /> Teamwork</label>
            <label><input type="checkbox" name="skills" value="Problem Solving" /> Problem Solving</label>
            <label><input type="checkbox" name="skills" value="Leadership" /> Leadership</label>
            <div class="error-message" aria-live="polite"></div>
          </fieldset>

          <div class="form-group">
            <label for="address">Address</label>
            <textarea id="address" name="address" placeholder="Street, City, State, ZIP" required></textarea>
            <div class="error-message" aria-live="polite"></div>
          </div>

          <div class="form-group">
            <label for="coverLetter">Cover Letter</label>
            <textarea id="coverLetter" name="coverLetter" placeholder="Write a short cover letter" required></textarea>
            <div class="error-message" aria-live="polite"></div>
          </div>

          <button type="submit">Submit Application</button>
          <p id="successMessage" class="success-message" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
